name: lint

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: repo hygiene without generated artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PYTHONPATH: python
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Shell syntax and repository lint
        run: scripts/lint.sh

      - name: Optional formatter check
        run: scripts/format.sh --check
