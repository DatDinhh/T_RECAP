name: build

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cmake-python:
    name: C++ library/tools and Python tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: "2"
      CTEST_OUTPUT_ON_FAILURE: "1"
      PYTHONPATH: python
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Layout and schema checks
        run: |
          make check-layout
          make check-schemas

      - name: Configure CMake
        run: |
          cmake -S . -B build/ci -G Ninja \
            -DTRECAP_BUILD_TESTS=ON \
            -DTRECAP_BUILD_TOOLS=ON \
            -DTRECAP_ENABLE_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build/ci --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

      - name: CTest
        run: ctest --test-dir build/ci --output-on-failure

      - name: Python tests
        run: make python-test
