name: reproducibility

"on":
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"
  pull_request:
    paths:
      - "include/**"
      - "src/**"
      - "tools/**"
      - "python/**"
      - "configs/**"
      - "spec/**"
      - "tests/golden_selfcheck/**"
      - "scripts/check_reproducible.sh"
      - "Makefile"
      - "CMakeLists.txt"

permissions:
  contents: read

concurrency:
  group: reproducibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-selfcheck:
    name: quick selfcheck manifest
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PYTHONPATH: python
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Quick reproducibility gate
        run: scripts/check_reproducible.sh --quick

  full-smoke-reproducibility:
    name: full smoke artifact reproducibility
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    if: github.event_name != 'pull_request'
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: "2"
      PYTHONPATH: python
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      SUITE: configs/suites/smoke.json
      RELEASE_CONFIG: configs/releases/phase2_revJ_dev.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Regenerate twice and compare
        run: scripts/check_reproducible.sh --suite "${SUITE}" --release-config "${RELEASE_CONFIG}"
